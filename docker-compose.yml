services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: iot_broker
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: always

  db:
    image: timescale/timescaledb:latest-pg15
    container_name: iot_db
    environment:
      POSTGRES_DB: gestao_energia
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: senha_segura_iot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
  
  nginx:
    image: nginx:alpine
    container_name: iot_gateway
    ports:
      - "80:80" # Agora você acessa apenas o IP, sem porta 5173 ou 8000
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/usr/share/nginx/html # Arquivos do React
      - ./backend/static:/app/static # Arquivos estáticos do Django
    depends_on:
      - web
    restart: always

  web:
    build: ./backend
    container_name: django_app
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 5 --timeout 120
    volumes:
      - ./backend:/app
    environment:
      - DEBUG=False
      - DB_NAME=gestao_energia
      - DB_USER=admin
      - DB_PASSWORD=senha_segura_iot
      - DB_HOST=db
    depends_on:
      - db
      - mosquitto
  
  mqtt_worker:
    build: ./backend
    container_name: iot_worker
    
    command: python -m sensores.mqtt_worker
    volumes:
      - ./backend:/app
    environment:
      - DB_NAME=gestao_energia
      - DB_USER=admin
      - DB_PASSWORD=senha_segura_iot
      - DB_HOST=db
    depends_on:
      - db
      - mosquitto
    restart: always
  
  # frontend:
  #   build: ./frontend
  #   container_name: react_app
  #   volumes:
  #     - ./frontend:/app
  #     - /app/node_modules # Evita sobrescrever os módulos instalados no container
  #   ports:
  #     - "5173:5173"
